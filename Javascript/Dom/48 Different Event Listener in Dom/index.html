<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS DOM</title>
  <link rel="stylesheet" href="style.css">
  <!-- icon link -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="shortcut icon" href="./favicon/favicon.png" type="image/x-icon">
</head>

<body>

  <div class="piano-container">
    <h2>Virtual Piano</h2>

    <div class="piano" id="piano">

      <div class="black-btns">
        <div class="div1" id="same">
          <div class="class1 black" data-note="C">C</div>
          <div class="class1 black" data-note="C">D</div>
        </div>

        <div class="div2" id="same">
          <div class="class1 black" data-note="C">E</div>
          <div class="class1 black" data-note="C">F</div>
          <div class="class1 black" data-note="C">G</div>
        </div>

        <div class="div3" id="same">
          <div class="class1 black" data-note="C">A</div>
          <div class="class1 black" data-note="C">B</div>
        </div>

        <div class="div4" id="same">
          <div class="class1 black" data-note="C">C</div>
          <div class="class1 black" data-note="C">D</div>
          <div class="class1 black" data-note="C">E</div>
        </div>

        <div class="div5" id="same">
          <div class="class1 black" data-note="C">F</div>
          <div class="class1 black" data-note="C">G</div>
        </div>

        <div class="div6" id="same">
          <div class="class1 black" data-note="C">A</div>
          <div class="class1 black" data-note="C">B</div>
          <div class="class1 black" data-note="C">C</div>
        </div>

        <div class="div7" id="same">
          <div class="class1 black" data-note="C">D</div>
          <div class="class1 black" data-note="C">E</div>
        </div>

        <div class="div8" id="same">
          <div class="class1 black" data-note="C">F</div>
          <div class="class1 black" data-note="C">G</div>
          <div class="class1 black" data-note="C">A</div>
        </div>

      </div>

      <div class="white-btns">
        <div class="class1 white" id="white" data-note="C">C</div>
        <div class="class1 white" data-note="C">D</div>
        <div class="class1 white" data-note="C">E</div>
        <div class="class1 white" data-note="C">F</div>
        <div class="class1 white" data-note="C">G</div>
        <div class="class1 white" data-note="C">A</div>
        <div class="class1 white" data-note="C">B</div>
        <div class="class1 white" data-note="C">C</div>
        <div class="class1 white" data-note="C">D</div>
        <div class="class1 white" data-note="C">E</div>
        <div class="class1 white" data-note="C">F</div>
        <div class="class1 white" data-note="C">G</div>
        <div class="class1 white" data-note="C">A</div>
        <div class="class1 white" data-note="C">B</div>
        <div class="class1 white" data-note="C">C</div>
        <div class="class1 white" data-note="C">D</div>
        <div class="class1 white" data-note="C">E</div>
        <div class="class1 white" data-note="C">F</div>
        <div class="class1 white" data-note="C">G</div>
        <div class="class1 white" data-note="C">A</div>
        <div class="class1 white" data-note="C">B</div>
        <div class="class1 white" data-note="C">C</div>
        <div class="class1 white" data-note="C">D</div>
        <div class="class1 white" data-note="C">E</div>
        <div class="class1 white" data-note="C">F</div>
        <div class="class1 white" data-note="C">G</div>
        <div class="class1 white" data-note="C">A</div>
        <div class="class1 white" data-note="C">B</div>
        <div class="class1 white" data-note="C">C</div>

      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
